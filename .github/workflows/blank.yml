name: MLX DoRA Continuous Training
on:
  workflow_dispatch:
  schedule:
    - cron: '5 * * * *' 

jobs:
  train:
    # This now tests on the latest M4 hardware (macos-26)
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [macos-14, macos-26] # Parallel test: M1 vs M4
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install MLX
        run: pip install "mlx-lm[train]"

      - name: Restore Last Checkpoint
        id: cache-resume
        uses: actions/cache/restore@v4
        with:
          path: adapters_dora
          key: dora-${{ matrix.os }}-${{ github.run_id }}-${{ github.run_attempt }}
          restore-keys: |
            dora-${{ matrix.os }}-

      - name: Prepare Data
        run: |
          mkdir -p data/cve_cpt
          # We provide at least 1 line. Using --batch-size 1 below avoids the error.
          cat > data/cve_cpt/train.jsonl <<-'JSONL'
          {"text":"CVE-2021-44228 is a remote code execution vulnerability in Apache Log4j."}
          JSONL
          cp data/cve_cpt/train.jsonl data/cve_cpt/test.jsonl
          cp data/cve_cpt/train.jsonl data/cve_cpt/valid.jsonl

      - name: Train DoRA
        run: |
          RESUME_ARG=""
          if [ -f "adapters_dora/adapters.safetensors" ]; then
            echo "🎯 FOUND PREVIOUS WEIGHTS. RESUMING..."
            RESUME_ARG="--resume-adapter-file adapters_dora/adapters.safetensors"
          fi

          # FIX: Added --batch-size 1 to handle small datasets
          mlx_lm.lora \
            --model mlx-community/mamba-130m-hf-bf16 \
            --train \
            --fine-tune-type dora \
            --data data/cve_cpt \
            --batch-size 1 \
            --iters 50 \
            --adapter-path adapters_dora \
            $RESUME_ARG

      - name: Save Progress
        if: always()
        uses: actions/cache/save@v4
        with:
          path: adapters_dora
          key: dora-${{ matrix.os }}-${{ github.run_id }}-${{ github.run_attempt }}
