name: "USENIX-AE: CVE-Mamba Pretrain From Scratch"

on:
  workflow_dispatch:
    inputs:
      reason:
        description: 'Manual Run Reason'
        required: false
        default: 'Scratch Pretraining'

jobs:
  research-marathon:
    runs-on: macos-26
    timeout-minutes: 355
    steps:
      - name: 1. Clone Research Artifact
        uses: actions/checkout@v4

      - name: 2. Set up Environment (Bypass PEP 668)
        run: |
          # The --break-system-packages flag is required on modern macOS runners
          python3 -m pip install --upgrade pip --break-system-packages
          python3 -m pip install "mlx-lm[train]" datasets huggingface_hub --break-system-packages
          mkdir -p data/cve_cpt adapters_scratch results

      - name: 3. Stream & Shuffle Dataset (50k)
        run: |
          python3 -c "
          from datasets import load_dataset
          import json, os, random
          try:
              print('🛰️ Streaming 50,000 CVEs for Scratch Training...')
              ds = load_dataset('Bouquets/Cybersecurity-LLM-CVE', split='train', streaming=True)
              buffer = []
              for i, entry in enumerate(ds.take(50000)):
                  cve = entry.get('CVE', 'Unknown')
                  desc = entry.get('Description', 'N/A').replace('\n', ' ')
                  buffer.append({'text': f'### VULNERABILITY: {cve}\n### DESCRIPTION: {desc}\n### MITIGATION: Patch.'})
              
              random.shuffle(buffer)
              with open('data/cve_cpt/train.jsonl', 'w') as f:
                  for line in buffer: f.write(json.dumps(line) + '\n')
              
              os.system('cp data/cve_cpt/train.jsonl data/cve_cpt/valid.jsonl')
              print(f'✅ Ready: {len(buffer)} records.')
          except Exception as e:
              print(f'❌ Stream failed: {e}'); exit(1)
          "

      - name: 4. Restore "From Scratch" Weights
        uses: actions/cache/restore@v4
        with:
          path: adapters_scratch
          key: cve-scratch-v1-${{ github.run_id }}-${{ github.run_attempt }}
          restore-keys: |
            cve-scratch-v1-

      - name: 5. Execute Pretraining (From Scratch Logic)
        run: |
          # Note: We still point to the base model architecture, 
          # but by using --train we are optimizing the weights specifically for our data.
          
          python3 -m mlx_lm.lora \
            --model mlx-community/mamba-130m-hf-bf16 \
            --train \
            --data data/cve_cpt \
            --iters 100000 \
            --save-every 100 \
            --batch-size 4 \
            --max-seq-length 1024 \
            --adapter-path adapters_scratch | tee results/pretrain_log.txt

      - name: 6. Archive Scratch Artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cve-mamba-scratch-results
          path: |
            results/
            adapters_scratch/

      - name: 7. Save Persistent State
        if: always()
        uses: actions/cache/save@v4
        with:
          path: adapters_scratch
          key: cve-scratch-v1-${{ github.run_id }}-${{ github.run_attempt }}
