name: MLX Mamba 130M CPT Smoke Test
on:
  workflow_dispatch:
  push:
    paths: ["*.yml"]

jobs:
  mlx-mamba-cpt-smoke:
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install "mlx-lm[train]" sentencepiece

      - name: Prepare Dataset
        run: |
          mkdir -p data/cve_cpt
          echo '{"text":"CVE-2021-44228 is a remote code execution vulnerability."}' > data/cve_cpt/train.jsonl
          echo '{"text":"SQL injection allows unauthorized database access."}' >> data/cve_cpt/train.jsonl
          cp data/cve_cpt/train.jsonl data/cve_cpt/test.jsonl
          cp data/cve_cpt/train.jsonl data/cve_cpt/valid.jsonl

      - name: Baseline Evaluation
        run: |
          python -c "
          import json
          from mlx_lm import load
          from mlx_lm.tuner import evaluate
          m, t = load('mlx-community/mamba-130m-hf-bf16')
          with open('data/cve_cpt/test.jsonl') as f:
              d = [json.loads(l)['text'] for l in f]
          l = evaluate(model=m, tokenizer=t, dataset=d, batch_size=1)
          print(f'BASELINE_LOSS:{l}')
          " | tee baseline_test.txt

      - name: Training (LoRA)
        run: |
          mlx_lm.lora \
            --model mlx-community/mamba-130m-hf-bf16 \
            --train \
            --data data/cve_cpt \
            --adapter-path adapters \
            --iters 10 \
            --batch-size 1

      - name: Post-Train Evaluation
        run: |
          mlx_lm.lora \
            --model mlx-community/mamba-130m-hf-bf16 \
            --adapter-path adapters \
            --data data/cve_cpt \
            --test \
            --batch-size 1 | tee post_train_test.txt

      - name: Performance Comparison
        run: |
          python -c "
          import re, sys, pathlib
          b = re.search(r'BASELINE_LOSS:([\d.]+)', pathlib.Path('baseline_test.txt').read_text())
          p = re.search(r'test loss\s+([\d.]+)', pathlib.Path('post_train_test.txt').read_text())
          if not b or not p: sys.exit(1)
          bl, pl = float(b.group(1)), float(p.group(1))
          print(f'B: {bl} | P: {pl}')
          sys.exit(0 if pl <= bl + 0.1 else 1)
          "
