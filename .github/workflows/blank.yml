name: MLX Mamba 130M CPT Smoke Test

on:
  workflow_dispatch:
  push:
    paths:
      - ".github/workflows/mlx-mamba-cpt.yml"

jobs:
  mlx-mamba-cpt-smoke:
    runs-on: macos-14
    timeout-minutes: 150

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install "mlx-lm[train]" sentencepiece

      - name: Prepare Dataset
        run: |
          mkdir -p data/cve_cpt
          cat > data/cve_cpt/train.jsonl <<-'JSONL'
          {"text":"CVE-2021-44228 is a remote code execution vulnerability in Apache Log4j."}
          {"text":"SQL injection occurs when unsanitized user input is concatenated into a query."}
          JSONL
          # Using the same data for all splits for a valid smoke test
          cp data/cve_cpt/train.jsonl data/cve_cpt/test.jsonl
          cp data/cve_cpt/train.jsonl data/cve_cpt/valid.jsonl

      - name: Baseline Evaluation (Direct API)
        run: |
          set -euxo pipefail
          echo "=== Starting BASELINE EVALUATION ==="
          python -c "
          from mlx_lm import load
          from mlx_lm.tuner import datasets, evaluate
          from pathlib import Path
          
          # 1. Load model and tokenizer
          model, tokenizer = load('mlx-community/mamba-130m-hf-bf16')
          
          # 2. Load dataset triple (train, valid, test)
          # Newer versions require tokenizer as a positional argument
          train, valid, test = datasets.load_dataset(Path('data/cve_cpt'), tokenizer)
          
          # 3. Run evaluation on the test set specifically
          loss = evaluate(model, test, tokenizer, batch_size=1)
          print(f'BASELINE_LOSS:{loss}')
          " | tee baseline_test.txt

      - name: Training (LoRA)
        run: |
          set -euxo pipefail
          echo "=== Starting TRAINING ==="
          mlx_lm.lora \
            --model mlx-community/mamba-130m-hf-bf16 \
            --train \
            --data data/cve_cpt \
            --adapter-path adapters_cve_smoke \
            --iters 20 \
            --batch-size 1

      - name: Post-Train Evaluation
        run: |
          set -euxo pipefail
          echo "=== Starting POST-TRAIN EVALUATION ==="
          mlx_lm.lora \
            --model mlx-community/mamba-130m-hf-bf16 \
            --adapter-path adapters_cve_smoke \
            --data data/cve_cpt \
            --test \
            --batch-size 1 | tee post_train_test.txt

      - name: Performance Comparison
        run: |
          set -euxo pipefail
          python -c "
          import re, sys
          from pathlib import Path
          
          b_text = Path('baseline_test.txt').read_text()
          p_text = Path('post_train_test.txt').read_text()
          
          # Extract loss using regex
          b_match = re.search(r'BASELINE_LOSS:([\d.]+)', b_text)
          p_match = re.search(r'test loss\s+([\d.]+)', p_text)
          
          if not b_match or not p_match:
              print('Error: Could not find loss values in logs.')
              sys.exit(1)
              
          b_loss = float(b_match.group(1))
          p_loss = float(p_match.group(1))
          
          print(f'Baseline: {b_loss} | Post-train: {p_loss}')
          
          # CI Passes if training didn't break things (loss stayed same or decreased)
          if p_loss <= b_loss + 0.05:
              print('✅ CI Passed')
              sys.exit(0)
          else:
              print('❌ CI Failed: Loss increased significantly after training.')
              sys.exit(1)
          "

      - name: Upload Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mlx-mamba-smoke-results
          path: |
            *.txt
            adapters_cve_smoke/
