name: "USENIX-AE: CVE-Mamba Pretrain From Scratch"

on:
  workflow_dispatch:
    inputs:
      reason:
        description: 'Manual Run Reason'
        required: false
        default: 'Scratch Pretraining'

jobs:
  research-marathon:
    runs-on: macos-26
    timeout-minutes: 355
    steps:
      - name: 1. Clone Research Artifact
        uses: actions/checkout@v4

      - name: 2. Set up Environment (Stable Venv)
        run: |
          # Create a virtual environment to avoid Homebrew/System Python conflicts
          python3 -m venv venv
          source venv/bin/activate
          
          # Install research tools inside the venv
          pip install "mlx-lm[train]" datasets huggingface_hub
          
          # Verify MLX can see the GPU (M-series chip)
          python -c "import mlx.core as mx; print(f'✅ MLX is active on: {mx.default_device()}')"
          
          mkdir -p data/cve_cpt adapters_scratch results

      - name: 3. Stream & Shuffle Dataset (50k)
        run: |
          source venv/bin/activate
          python3 -c "
          from datasets import load_dataset
          import json, os, random
          try:
              print('🛰️ Streaming 50,000 CVEs...')
              ds = load_dataset('Bouquets/Cybersecurity-LLM-CVE', split='train', streaming=True)
              buffer = []
              for i, entry in enumerate(ds.take(50000)):
                  cve = entry.get('CVE', 'Unknown')
                  desc = entry.get('Description', 'N/A').replace('\n', ' ')
                  buffer.append({'text': f'### VULNERABILITY: {cve}\n### DESCRIPTION: {desc}\n### MITIGATION: Patch.'})
              
              random.shuffle(buffer)
              with open('data/cve_cpt/train.jsonl', 'w') as f:
                  for line in buffer: f.write(json.dumps(line) + '\n')
              
              os.system('cp data/cve_cpt/train.jsonl data/cve_cpt/valid.jsonl')
              print(f'✅ Ready: {len(buffer)} records.')
          except Exception as e:
              print(f'❌ Stream failed: {e}'); exit(1)
          "

      - name: 4. Restore State
        uses: actions/cache/restore@v4
        with:
          path: |
            adapters_scratch
            venv
          key: cve-scratch-v2-${{ github.run_id }}-${{ github.run_attempt }}
          restore-keys: |
            cve-scratch-v2-

      - name: 5. Execute Pretraining
        run: |
          source venv/bin/activate
          # Pretraining from scratch logic
          python3 -m mlx_lm.lora \
            --model mlx-community/mamba-130m-hf-bf16 \
            --train \
            --data data/cve_cpt \
            --iters 100000 \
            --save-every 100 \
            --batch-size 4 \
            --max-seq-length 1024 \
            --adapter-path adapters_scratch | tee results/pretrain_log.txt

      - name: 6. Archive Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cve-mamba-scratch-results
          path: |
            results/
            adapters_scratch/

      - name: 7. Save State
        if: always()
        uses: actions/cache/save@v4
        with:
          path: |
            adapters_scratch
            venv
          key: cve-scratch-v2-${{ github.run_id }}-${{ github.run_attempt }}
