name: MLX LoRA vs DoRA Performance Test
on:
  workflow_dispatch:

jobs:
  train-eval:
    runs-on: macos-14
    strategy:
      matrix:
        # This will run two jobs at the same time
        method: ["lora", "dora"]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install "mlx-lm[train]" sentencepiece

      - name: Prepare Dataset
        run: |
          mkdir -p data/cve_cpt
          cat > data/cve_cpt/train.jsonl <<-'JSONL'
          {"text":"CVE-2021-44228 is a remote code execution vulnerability in Apache Log4j."}
          {"text":"SQL injection occurs when unsanitized user input is concatenated into a query."}
          {"text":"Buffer overflows happen when data exceeds the allocated memory buffer."}
          {"text":"Cross-site scripting (XSS) allows attackers to inject scripts into web pages."}
          {"text":"Broken access control is a common security vulnerability in web apps."}
          JSONL
          cp data/cve_cpt/train.jsonl data/cve_cpt/test.jsonl
          cp data/cve_cpt/train.jsonl data/cve_cpt/valid.jsonl

      - name: Run Training (${{ matrix.method }})
        run: |
          # Note: we use --fine-tune-type for the standard mlx-lm package
          mlx_lm.lora \
            --model mlx-community/mamba-130m-hf-bf16 \
            --train \
            --fine-tune-type ${{ matrix.method }} \
            --data data/cve_cpt \
            --iters 100 \
            --learning-rate 1e-4 \
            --batch-size 1 \
            --adapter-path adapters_${{ matrix.method }}

      - name: Evaluate Accuracy
        run: |
          echo "### Results for ${{ matrix.method }}" > report_${{ matrix.method }}.md
          mlx_lm.lora \
            --model mlx-community/mamba-130m-hf-bf16 \
            --adapter-path adapters_${{ matrix.method }} \
            --data data/cve_cpt \
            --test >> report_${{ matrix.method }}.md

      - name: Upload Results
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.method }}-results
          path: report_${{ matrix.method }}.md

  summary:
    needs: train-eval
    runs-on: ubuntu-latest
    steps:
      - name: Download all results
        uses: actions/download-artifact@v4
      
      - name: Display Comparison
        run: |
          echo "LO-RA RESULTS:"
          cat lora-results/report_lora.md
          echo -e "\nDO-RA RESULTS:"
          cat dora-results/report_dora.md
