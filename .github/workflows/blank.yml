name: MLX DoRA Continuous Training
on:
  workflow_dispatch:
  schedule:
    - cron: '5 * * * *' 

jobs:
  train:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        # We keep both to monitor when the 'macos-26' optimization finally overtakes 14
        os: [macos-14, macos-26] 
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install MLX
        run: pip install "mlx-lm[train]"

      # THE INSPECTOR: See exactly what Apple Silicon you landed on
      - name: Inspect Hardware
        run: |
          echo "🚀 TARGET OS: ${{ matrix.os }}"
          echo "--- CPU Info ---"
          sysctl -n machdep.cpu.brand_string
          echo "--- GPU/Cores Info ---"
          system_profiler SPDisplaysDataType | grep "Total Number of Cores"
          echo "--- RAM Info ---"
          sysctl hw.memsize | awk '{print $2/1024/1024/1024 " GB"}'

      - name: Restore Last Checkpoint
        id: cache-resume
        uses: actions/cache/restore@v4
        with:
          path: adapters_dora
          key: dora-${{ matrix.os }}-${{ github.run_id }}-${{ github.run_attempt }}
          restore-keys: |
            dora-${{ matrix.os }}-

      - name: Prepare Data
        run: |
          mkdir -p data/cve_cpt
          echo '{"text":"CVE-2021-44228 is a critical RCE in Log4j 2.14.1 via JNDI lookup patterns."}' > data/cve_cpt/train.jsonl
          cp data/cve_cpt/train.jsonl data/cve_cpt/test.jsonl
          cp data/cve_cpt/train.jsonl data/cve_cpt/valid.jsonl

      - name: Train DoRA
        run: |
          RESUME_ARG=""
          if [ -f "adapters_dora/adapters.safetensors" ]; then
            RESUME_ARG="--resume-adapter-file adapters_dora/adapters.safetensors"
          fi

          mlx_lm.lora \
            --model mlx-community/mamba-130m-hf-bf16 \
            --train \
            --fine-tune-type dora \
            --data data/cve_cpt \
            --batch-size 1 \
            --iters 100 \
            --max-seq-length 512 \
            --adapter-path adapters_dora \
            $RESUME_ARG

      - name: Save Progress
        if: always()
        uses: actions/cache/save@v4
        with:
          path: adapters_dora
          key: dora-${{ matrix.os }}-${{ github.run_id }}-${{ github.run_attempt }}
