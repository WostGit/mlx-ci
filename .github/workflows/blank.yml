name: "USENIX-AE: CVE-Mamba Research Pipeline"

on:
  workflow_dispatch:
    inputs:
      reason:
        description: 'Manual Run Reason'
        required: false
        default: 'Training Marathon'
  schedule:
    - cron: '0 0 * * *'

jobs:
  research-marathon:
    runs-on: macos-26
    timeout-minutes: 355
    steps:
      - name: 1. Clone Research Artifact
        uses: actions/checkout@v4

      - name: 2. Set up Environment
        run: |
          python3 -m pip install --upgrade pip
          python3 -m pip install "mlx-lm[train]" datasets huggingface_hub
          mkdir -p data/cve_cpt adapters_dora results

      - name: 3. Establish Baseline (Untrained)
        run: |
          echo "📊 Capturing Untrained Model Response..."
          python3 -m mlx_lm.generate \
            --model mlx-community/mamba-130m-hf-bf16 \
            --prompt "### VULNERABILITY: CVE-2021-44228\n### DESCRIPTION:" \
            --max-tokens 50 > results/baseline_response.txt

      - name: 4. Stream & Shuffle Dataset (50k)
        run: |
          python3 -c "
          from datasets import load_dataset
          import json, os, random
          try:
              print('🛰️ Streaming 50,000 CVEs...')
              ds = load_dataset('Bouquets/Cybersecurity-LLM-CVE', split='train', streaming=True)
              buffer = []
              for i, entry in enumerate(ds.take(50000)):
                  cve = entry.get('CVE', 'Unknown')
                  desc = entry.get('Description', 'N/A').replace('\n', ' ')
                  buffer.append({'text': f'### VULNERABILITY: {cve}\n### DESCRIPTION: {desc}\n### MITIGATION: Patch.'})
              
              random.shuffle(buffer)
              with open('data/cve_cpt/train.jsonl', 'w') as f:
                  for line in buffer: f.write(json.dumps(line) + '\n')
              
              os.system('cp data/cve_cpt/train.jsonl data/cve_cpt/valid.jsonl')
              print(f'✅ Shuffled {len(buffer)} records.')
          except Exception as e:
              print(f'❌ Stream failed: {e}'); exit(1)
          "

      - name: 5. Restore Previous Brain State
        uses: actions/cache/restore@v4
        with:
          path: adapters_dora
          key: cve-brain-v5-${{ github.run_id }}-${{ github.run_attempt }}
          restore-keys: |
            cve-brain-v5-

      - name: 6. Execute 6-Hour Training
        run: |
          RESUME_ARG=""
          if [ -f "adapters_dora/adapter_config.json" ]; then
            echo "🎯 RESUMING: Previous weights found."
            RESUME_ARG="--resume-adapter-file adapters_dora/adapters.safetensors"
          fi

          python3 -m mlx_lm.lora \
            --model mlx-community/mamba-130m-hf-bf16 \
            --train \
            --fine-tune-type dora \
            --data data/cve_cpt \
            --iters 100000 \
            --save-every 100 \
            --batch-size 4 \
            --max-seq-length 1024 \
            --adapter-path adapters_dora \
            $RESUME_ARG | tee results/training_log.txt

      - name: 7. Qualitative Evaluation (Final)
        if: always()
        run: |
          if [ -f "adapters_dora/adapter_config.json" ]; then
            echo "🎯 Generating Post-Training Response..."
            python3 -m mlx_lm.generate \
              --model mlx-community/mamba-130m-hf-bf16 \
              --adapter-path adapters_dora \
              --prompt "### VULNERABILITY: CVE-2021-44228\n### DESCRIPTION:" \
              --max-tokens 50 > results/artifact_response.txt
            
            echo "--- BASELINE (Pre-Training) ---"
            cat results/baseline_response.txt
            echo "--- ARTIFACT (Post-Training) ---"
            cat results/artifact_response.txt
          fi

      - name: 8. Archive Research Artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cve-mamba-results
          path: |
            results/
            adapters_dora/

      - name: 9. Save Persistent Brain State
        if: always()
        uses: actions/cache/save@v4
        with:
          path: adapters_dora
          key: cve-brain-v5-${{ github.run_id }}-${{ github.run_attempt }}
