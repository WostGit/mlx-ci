name: MLX LoRA vs DoRA Comparison
on:
  workflow_dispatch:
  push:
    paths: ["*.yml"]

jobs:
  compare-methods:
    runs-on: macos-14
    timeout-minutes: 45
    strategy:
      matrix:
        method: ["lora", "dora"] # This runs the job twice: once for each method

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install "mlx-lm[train]" sentencepiece

      - name: Prepare Dataset
        run: |
          mkdir -p data/cve_cpt
          cat > data/cve_cpt/train.jsonl <<-'JSONL'
          {"text":"CVE-2021-44228 is a remote code execution vulnerability in Apache Log4j."}
          {"text":"SQL injection occurs when unsanitized user input is concatenated into a query."}
          {"text":"Buffer overflows happen when data exceeds the allocated memory buffer."}
          {"text":"Cross-site scripting (XSS) allows attackers to inject scripts into web pages."}
          {"text":"Broken access control is a common security vulnerability in web apps."}
          JSONL
          cp data/cve_cpt/train.jsonl data/cve_cpt/test.jsonl
          cp data/cve_cpt/train.jsonl data/cve_cpt/valid.jsonl

      - name: Train (${{ matrix.method }})
        run: |
          # We use 100 iterations to actually see a difference in Loss
          mlx_lm.lora \
            --model mlx-community/mamba-130m-hf-bf16 \
            --train \
            --train-type ${{ matrix.method }} \
            --data data/cve_cpt \
            --adapter-path adapters_${{ matrix.method }} \
            --iters 100 \
            --learning-rate 1e-4 \
            --batch-size 1

      - name: Evaluate Accuracy (Loss)
        run: |
          echo "RESULTS FOR ${{ matrix.method }}:"
          mlx_lm.lora \
            --model mlx-community/mamba-130m-hf-bf16 \
            --adapter-path adapters_${{ matrix.method }} \
            --data data/cve_cpt \
            --test | tee stats_${{ matrix.method }}.txt

      - name: Upload Stats
        uses: actions/upload-artifact@v4
        with:
          name: stats-${{ matrix.method }}
          path: stats_${{ matrix.method }}.txt
