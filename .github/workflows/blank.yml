name: MLX Mamba 130M CPT Smoke Test

on:
  workflow_dispatch:
  push:
    paths:
      - ".github/workflows/mlx-mamba-cpt.yml"

jobs:
  mlx-mamba-cpt-smoke:
    runs-on: macos-14
    timeout-minutes: 150

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          set -euxo pipefail
          python -m pip install --upgrade pip
          pip install "mlx-lm[train]" sentencepiece

      - name: Prepare tiny CVE dataset
        run: |
          set -euxo pipefail
          mkdir -p data/cve_cpt adapters_cve_smoke
          
          # Create train.jsonl
          cat > data/cve_cpt/train.jsonl <<-'JSONL'
          {"text":"CVE-2021-44228 is a remote code execution vulnerability in Apache Log4j."}
          {"text":"SQL injection occurs when unsanitized user input is concatenated into a query."}
          JSONL

          # Create test.jsonl
          cat > data/cve_cpt/test.jsonl <<-'JSONL'
          {"text":"A successful exploit may permit arbitrary code execution against affected versions."}
          {"text":"Security teams assess exploitability and business impact when triaging a CVE."}
          JSONL

      - name: Baseline evaluation (raw model)
        run: |
          set -euxo pipefail
          echo "=== Starting BASELINE EVALUATION ==="
          # Use the Python API to evaluate the local test set without adapters
          python -c "
          from mlx_lm import load
          from mlx_lm.tuner import datasets, evaluate
          model, tokenizer = load('mlx-community/mamba-130m-hf-bf16')
          test_set = datasets.load_dataset('data/cve_cpt')
          loss = evaluate(model, test_set, tokenizer, batch_size=1)
          print(f'test loss {loss:.4f}')
          " 2>&1 | tee baseline_test.txt

      - name: Tiny CPT smoke train (LoRA)
        run: |
          set -euxo pipefail
          echo "=== Starting TRAINING ==="
          mlx_lm.lora \
            --model mlx-community/mamba-130m-hf-bf16 \
            --train \
            --data data/cve_cpt \
            --adapter-path adapters_cve_smoke \
            --iters 20 \
            --batch-size 1 \
            2>&1 | tee train_smoke.txt

      - name: Post-train evaluation (with adapter)
        run: |
          set -euxo pipefail
          echo "=== Starting POST-TRAIN EVALUATION ==="
          # This step uses the adapter we just made
          mlx_lm.lora \
            --model mlx-community/mamba-130m-hf-bf16 \
            --adapter-path adapters_cve_smoke \
            --data data/cve_cpt \
            --test \
            --batch-size 1 \
            2>&1 | tee post_train_test.txt

      - name: Summarize metrics
        run: |
          set -euxo pipefail
          python - <<-'PY'
          import re
          from pathlib import Path

          def get_val(fn):
              txt = Path(fn).read_text()
              m = re.search(r'loss\s+([0-9.]+)', txt, re.I)
              return float(m.group(1)) if m else None

          b, p = get_val('baseline_test.txt'), get_val('post_train_test.txt')
          print(f"Baseline: {b} | Post-train: {p}")
          if b and p and p <= b + 0.01:
              print("✅ SUCCESS")
          else:
              print("❌ FAILED or No Improvement")
              exit(1)
          PY

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mlx-mamba-smoke-results
          path: |
            *.txt
            adapters_cve_smoke/
