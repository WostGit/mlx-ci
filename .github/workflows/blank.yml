name: MLX Mamba 130M CPT Smoke Test

on:
  workflow_dispatch:
  push:
    paths:
      - ".github/workflows/mlx-mamba-cpt.yml"

jobs:
  mlx-mamba-cpt-smoke:
    runs-on: macos-14
    timeout-minutes: 120

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install "mlx-lm[train]" transformers sentencepiece huggingface_hub

      - name: Show runner info
        run: |
          uname -a
          python - <<'PY'
          import platform
          import mlx.core as mx
          print("Platform:", platform.platform())
          print("Machine:", platform.machine())
          print("Default device:", mx.default_device())
          PY

      - name: Build tiny CVE jargon dataset
        run: |
          mkdir -p data/cve_cpt
          cat > data/cve_cpt/train.jsonl <<'JSONL'
          {"text":"CVE-2021-44228 is a remote code execution vulnerability in Apache Log4j caused by unsafe JNDI lookups and often referred to as Log4Shell."}
          {"text":"A proof of concept exploit may trigger arbitrary code execution, privilege escalation, denial of service, or authentication bypass depending on the vulnerable component."}
          {"text":"Common security remediation steps include patching to the vendor fixed version, disabling the vulnerable feature, rotating credentials, and reviewing indicators of compromise."}
          {"text":"CVSS base score, attack vector, attack complexity, privileges required, user interaction, scope, confidentiality impact, integrity impact, and availability impact are common advisory fields."}
          {"text":"A memory corruption bug such as a heap overflow or use after free can enable code execution when a crafted input reaches the vulnerable parser."}
          {"text":"Server-side request forgery allows an attacker to coerce a service into making unintended outbound requests to internal resources or cloud metadata endpoints."}
          {"text":"SQL injection occurs when unsanitized user input is concatenated into a query, allowing data exfiltration, authentication bypass, or destructive database operations."}
          {"text":"Cross-site scripting can be stored, reflected, or DOM-based and may allow session theft, credential harvesting, or malicious script execution in the browser."}
          {"text":"An exploit chain may combine an information disclosure bug with a sandbox escape or local privilege escalation to achieve full system compromise."}
          {"text":"Security advisories often mention affected versions, fixed versions, mitigation guidance, exploitation status, severity, CWE mappings, and references to upstream commits."}
          {"text":"A directory traversal vulnerability can expose sensitive files outside the intended document root by using crafted relative path sequences."}
          {"text":"Remote unauthenticated attackers may exploit vulnerable network services by sending malformed packets, serialized payloads, or crafted HTTP requests."}
          {"text":"Ransomware operators frequently weaponize known vulnerabilities after public disclosure, especially when proof-of-concept code and internet-facing targets are available."}
          {"text":"Out-of-bounds read vulnerabilities may leak memory contents including pointers, tokens, session identifiers, or other secrets useful for follow-on attacks."}
          {"text":"Deserialization vulnerabilities arise when untrusted data is converted into executable objects without proper validation, integrity checks, or allowlisting."}
          {"text":"A vendor bulletin may state that exploitation in the wild has been observed, increasing operational urgency for patch deployment and exposure assessment."}
          {"text":"The vulnerable attack surface can include APIs, admin panels, message brokers, browser rendering engines, kernel drivers, and third-party libraries."}
          {"text":"Privilege escalation allows a user or process to obtain capabilities beyond those intended by the security boundary, often reaching administrator or root."}
          {"text":"Indicators of compromise can include anomalous child processes, outbound connections, suspicious authentication logs, or unexpected file modifications."}
          {"text":"A complete incident response workflow includes identification, containment, eradication, recovery, root cause analysis, and lessons learned."}
          JSONL

          cat > data/cve_cpt/valid.jsonl <<'JSONL'
          {"text":"The advisory assigned a high CVSS score because exploitation required low complexity and no user interaction while impacting confidentiality, integrity, and availability."}
          {"text":"Researchers published a proof of concept demonstrating remote code execution against an unpatched internet-facing service."}
          {"text":"Mitigations included restricting network exposure, disabling a dangerous feature, and upgrading to a fixed release from the vendor."}
          {"text":"Attackers chained an information leak with privilege escalation to gain persistent access to the target host."}
          {"text":"The bulletin recommended reviewing logs for indicators of compromise and rotating exposed credentials after patching."}
          JSONL

          cat > data/cve_cpt/test.jsonl <<'JSONL'
          {"text":"A successful exploit may permit arbitrary code execution, data exfiltration, or denial of service against affected versions."}
          {"text":"The remediation plan prioritizes patch validation, staged deployment, and post-remediation monitoring for suspicious activity."}
          {"text":"Security teams assess exploitability, exposure, compensating controls, and business impact when triaging a newly disclosed CVE."}
          JSONL

      - name: Baseline generation
        run: |
          python - <<'PY'
          from mlx_lm import load, generate

          model_name = "mlx-community/mamba-130m-hf-bf16"
          model, tokenizer = load(model_name)

          prompt = "Write a short security advisory about a remote code execution CVE affecting a web server:"
          out = generate(model, tokenizer, prompt=prompt, max_tokens=120, verbose=False)

          with open("baseline_generation.txt", "w") as f:
              f.write(out)

          print(out)
          PY

      - name: Baseline perplexity
        run: |
          python -m mlx_lm.lora \
            --model mlx-community/mamba-130m-hf-bf16 \
            --data data/cve_cpt \
            --test \
            2>&1 | tee baseline_test.txt

      - name: Tiny CPT smoke train
        continue-on-error: true
        run: |
          python -m mlx_lm.lora \
            --model mlx-community/mamba-130m-hf-bf16 \
            --train \
            --fine-tune-type full \
            --data data/cve_cpt \
            --adapter-path adapters_cve_smoke \
            --batch-size 1 \
            --iters 20 \
            --steps-per-report 5 \
            --steps-per-eval 10 \
            --learning-rate 1e-5 \
            --max-seq-length 512 \
            2>&1 | tee train_smoke.txt

      - name: Post-train perplexity
        continue-on-error: true
        run: |
          python -m mlx_lm.lora \
            --model mlx-community/mamba-130m-hf-bf16 \
            --adapter-path adapters_cve_smoke \
            --data data/cve_cpt \
            --test \
            2>&1 | tee post_train_test.txt

      - name: Post-train generation
        continue-on-error: true
        run: |
          python - <<'PY'
          from pathlib import Path
          from mlx_lm import load, generate

          model_name = "mlx-community/mamba-130m-hf-bf16"
          adapter_dir = "adapters_cve_smoke"

          if not Path(adapter_dir).exists():
              print("No adapter/output directory found; skipping post-train generation.")
              raise SystemExit(0)

          model, tokenizer = load(model_name, adapter_path=adapter_dir)

          prompt = "Write a short security advisory about a remote code execution CVE affecting a web server:"
          out = generate(model, tokenizer, prompt=prompt, max_tokens=120, verbose=False)

          with open("posttrain_generation.txt", "w") as f:
              f.write(out)

          print(out)
          PY

      - name: Summarize result
        if: always()
        run: |
          python - <<'PY'
          from pathlib import Path
          import re

          files = [
              "baseline_test.txt",
              "train_smoke.txt",
              "post_train_test.txt",
              "baseline_generation.txt",
              "posttrain_generation.txt",
          ]

          print("\n=== FILE STATUS ===")
          for f in files:
              p = Path(f)
              print(f, "exists" if p.exists() else "missing")

          def extract_loss(path):
              p = Path(path)
              if not p.exists():
                  return None
              text = p.read_text(errors="ignore")
              matches = re.findall(r"(?:loss|Loss|ppl|PPL|perplexity|Perplexity)[^0-9]*([0-9]+(?:\.[0-9]+)?)", text)
              return matches[-1] if matches else None

          baseline = extract_loss("baseline_test.txt")
          post = extract_loss("post_train_test.txt")

          print("\n=== SMOKE TEST SUMMARY ===")
          print("baseline metric:", baseline)
          print("post-train metric:", post)

          train_log = Path("train_smoke.txt")
          if train_log.exists():
              text = train_log.read_text(errors="ignore")
              if "Traceback" in text or "Error" in text or "Exception" in text:
                  print("train status: training command ran but may have failed or partially failed")
              else:
                  print("train status: training command appears to have completed")
          else:
              print("train status: missing train log")
          PY

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mlx-mamba-130m-cve-cpt-smoke
          path: |
            baseline_generation.txt
            baseline_test.txt
            train_smoke.txt
            post_train_test.txt
            posttrain_generation.txt
