jobs:
  mlx-mamba-cpt-smoke:
    runs-on: macos-14
    timeout-minutes: 150

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          set -euxo pipefail
          echo "=== Upgrading pip ==="
          python -m pip install --upgrade pip
          echo "=== Installing mlx-lm[train] and sentencepiece ==="
          pip install "mlx-lm[train]" sentencepiece
          echo "=== Installation completed ==="

      - name: Show environment (very verbose)
        run: |
          set -euxo pipefail
          echo "=== System Information ==="
          uname -a
          python - <<'PY'
          import platform, importlib.metadata as md, mlx.core as mx, sys
          print("Python version:", sys.version)
          print("Platform:", platform.platform())
          print("MLX version:", md.version("mlx"))
          print("MLX-LM version:", md.version("mlx-lm"))
          print("Default device:", mx.default_device())
          print("CUDA available:", hasattr(mx, 'cuda') and mx.cuda.is_available() if hasattr(mx, 'cuda') else "N/A (Apple Silicon)")
          PY
          echo "=== Environment shown ==="

      - name: Prepare directories and tiny CVE dataset
        run: |
          set -euxo pipefail
          echo "=== Creating directories ==="
          mkdir -p data/cve_cpt adapters_cve_smoke /tmp/no_adapter_dummy
          ls -la data/ adapters_cve_smoke/ /tmp/no_adapter_dummy || true

          echo "=== Writing train.jsonl ==="
          cat > data/cve_cpt/train.jsonl <<'JSONL'
          {"text":"CVE-2021-44228 is a remote code execution vulnerability in Apache Log4j caused by unsafe JNDI lookups and often referred to as Log4Shell."}
          {"text":"A proof of concept exploit may trigger arbitrary code execution, privilege escalation, denial of service, or authentication bypass depending on the vulnerable component."}
          {"text":"Common security remediation steps include patching to the vendor fixed version, disabling the vulnerable feature, rotating credentials, and reviewing indicators of compromise."}
          # ... (all your other lines - keep the full content you had)
          JSONL

          echo "=== Writing valid.jsonl and test.jsonl ==="
          cat > data/cve_cpt/valid.jsonl <<'JSONL'
          # ... (your valid lines)
          JSONL
          cat > data/cve_cpt/test.jsonl <<'JSONL'
          # ... (your test lines)
          JSONL

          echo "=== Dataset file counts ==="
          wc -l data/cve_cpt/*.jsonl
          ls -la data/cve_cpt/

      - name: Baseline generation (raw model - no adapter)
        run: |
          set -euxo pipefail
          echo "=== Starting BASELINE GENERATION (raw model) ==="
          mlx_lm.generate \
            --model mlx-community/mamba-130m-hf-bf16 \
            --prompt "Write a short security advisory about a remote code execution CVE affecting a web server:" \
            --max-tokens 120 \
            > baseline_generation.txt 2>&1
          echo "=== Baseline generation output ==="
          cat baseline_generation.txt
          echo "=== Baseline generation completed ==="

      - name: Baseline evaluation (raw model - NO adapter) - using dummy path
        run: |
          set -euxo pipefail
          echo "=== Starting BASELINE EVALUATION (raw model, no adapter) ==="
          echo "Using dummy adapter path: /tmp/no_adapter_dummy (exists but empty)"
          ls -la /tmp/no_adapter_dummy || true

          mlx_lm.lora \
            --model mlx-community/mamba-130m-hf-bf16 \
            --data data/cve_cpt \
            --test \
            --batch-size 1 \
            --adapter-path /tmp/no_adapter_dummy \
            2>&1 | tee baseline_test.txt

          echo "=== Full baseline_test.txt content ==="
          cat baseline_test.txt
          echo "=== Baseline evaluation completed ==="

      - name: Tiny CPT smoke train (LoRA)
        run: |
          set -euxo pipefail
          echo "=== Starting TRAINING (20 iterations smoke test) ==="
          mlx_lm.lora \
            --model mlx-community/mamba-130m-hf-bf16 \
            --train \
            --data data/cve_cpt \
            --adapter-path adapters_cve_smoke \
            --batch-size 1 \
            --iters 20 \
            --steps-per-report 5 \
            --steps-per-eval 10 \
            --learning-rate 1e-5 \
            --max-seq-length 256 \
            2>&1 | tee train_smoke.txt

          echo "=== Training log ==="
          cat train_smoke.txt
          echo "=== Adapter directory after training ==="
          ls -R adapters_cve_smoke || echo "Adapter directory not found"
          echo "=== Training completed ==="

      - name: Post-train evaluation (with adapter)
        run: |
          set -euxo pipefail
          echo "=== Starting POST-TRAIN EVALUATION (with adapter) ==="
          ls -la adapters_cve_smoke || true

          mlx_lm.lora \
            --model mlx-community/mamba-130m-hf-bf16 \
            --adapter-path adapters_cve_smoke \
            --data data/cve_cpt \
            --test \
            --batch-size 1 \
            2>&1 | tee post_train_test.txt

          echo "=== Full post_train_test.txt content ==="
          cat post_train_test.txt
          echo "=== Post-train evaluation completed ==="

      - name: Post-train generation (with adapter)
        run: |
          set -euxo pipefail
          echo "=== Starting POST-TRAIN GENERATION (with adapter) ==="
          mlx_lm.generate \
            --model mlx-community/mamba-130m-hf-bf16 \
            --adapter-path adapters_cve_smoke \
            --prompt "Write a short security advisory about a remote code execution CVE affecting a web server:" \
            --max-tokens 120 \
            > posttrain_generation.txt 2>&1

          echo "=== Post-train generation output ==="
          cat posttrain_generation.txt
          echo "=== Post-train generation completed ==="

      - name: Summarize metrics (verbose)
        run: |
          set -euxo pipefail
          echo "=== METRIC SUMMARY ==="
          python - <<'PY'
          import re
          from pathlib import Path

          def extract_metric(filename):
              text = Path(filename).read_text(errors='ignore')
              print(f"\n--- Content of {filename} ---")
              print(text[:1500] + "..." if len(text) > 1500 else text)  # show beginning
              for pat in [r'test loss[^0-9]*([0-9.]+)', r'\bloss[^0-9]*([0-9.]+)',
                          r'perplexity[^0-9]*([0-9.]+)', r'\bppl[^0-9]*([0-9.]+)']:
                  m = re.search(pat, text, re.I)
                  if m:
                      val = float(m.group(1))
                      print(f"Extracted metric using '{pat}': {val}")
                      return val
              print("No metric found!")
              return None

          b = extract_metric('baseline_test.txt')
          p = extract_metric('post_train_test.txt')

          print(f"\nFinal Summary:")
          print(f"Baseline loss/perplexity : {b}")
          print(f"Post-train loss/perplexity: {p}")

          if b is None or p is None:
              print("❌ Missing metric in one of the logs")
              raise SystemExit(1)

          if p <= b + 1e-6:
              print("✅ SUCCESS: Model improved (or stayed same)")
          else:
              print("⚠️  WARNING: Post-train metric worsened")
          PY
          echo "=== Metric summary completed ==="

      - name: Upload artifacts (always)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mlx-mamba-130m-cve-cpt-smoke
          path: |
            *_generation.txt
            *_test.txt
            train_smoke.txt
            adapters_cve_smoke/
