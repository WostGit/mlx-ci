name: "USENIX-AE: Mamba-DoRA-Hard-Code"

on:
  workflow_dispatch:
    inputs:
      reason:
        description: 'DoRA Hard Dataset Run'
        required: false
        default: 'Big-Vul C++ DoRA Training'

jobs:
  research-marathon:
    runs-on: macos-26
    timeout-minutes: 355
    steps:
      - name: 1. Clone Research Artifact
        uses: actions/checkout@v4

      - name: 2. Set up Environment (Stable Venv)
        run: |
          python3 -m venv venv
          source venv/bin/activate
          pip install "mlx-lm[train]" datasets huggingface_hub
          mkdir -p data/big_vul adapters_dora results

      - name: 3. Extract Vulnerable Code (MickyMike/cvefixes_bigvul)
        run: |
          source venv/bin/activate
          python3 -c "
          from datasets import load_dataset
          import json, os, random
          try:
              print('🛰️ Pulling Big-Vul Mirror...')
              ds = load_dataset('MickyMike/cvefixes_bigvul', split='train', streaming=True)
              buffer = []
              for i, entry in enumerate(ds.take(20000)):
                  vuln_code = entry.get('source', '')
                  fixed_code = entry.get('target', '')
                  cwe = entry.get('cwe_id', 'Unknown')
                  if vuln_code and fixed_code:
                      text = f'### VULNERABLE C++:\n{vuln_code}\n\n### CWE TYPE: {cwe}\n\n### FIXED CODE:\n{fixed_code}'
                      buffer.append({'text': text})
              random.shuffle(buffer)
              with open('data/big_vul/train.jsonl', 'w') as f:
                  for line in buffer: f.write(json.dumps(line) + '\n')
              os.system('cp data/big_vul/train.jsonl data/big_vul/valid.jsonl')
              print(f'✅ Prepared {len(buffer)} pairs.')
          except Exception as e:
              print(f'❌ Error: {e}'); exit(1)
          "

      - name: 4. Restore State
        uses: actions/cache/restore@v4
        with:
          path: |
            adapters_dora
            venv
          key: cve-dora-v1-${{ github.run_id }}-${{ github.run_attempt }}
          restore-keys: |
            cve-dora-v1-

      - name: 5. Execute DoRA Training (Context 2048)
        run: |
          source venv/bin/activate
          # Updated to non-deprecated calling convention + DoRA flag
          python -m mlx_lm lora \
            --model mlx-community/mamba-130m-hf-bf16 \
            --train \
            --fine-tune-type dora \
            --data data/big_vul \
            --iters 100000 \
            --save-every 100 \
            --batch-size 2 \
            --max-seq-length 2048 \
            --adapter-path adapters_dora | tee results/dora_train_log.txt

      - name: 6. Automated Audit Test
        if: always()
        run: |
          source venv/bin/activate
          echo "📊 Testing DoRA Vulnerability Repair..."
          python -m mlx_lm generate \
            --model mlx-community/mamba-130m-hf-bf16 \
            --adapter-path adapters_dora \
            --prompt '### VULNERABLE C++:\nvoid main() { char buf[8]; strcpy(buf, input); }\n\n### FIXED CODE:\n' \
            --max-tokens 100 > results/repair_test.txt
          cat results/repair_test.txt

      - name: 7. Save & Upload
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dora-mamba-results
          path: |
            results/
            adapters_dora/
      
      - name: 8. Update Cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: |
            adapters_dora
            venv
          key: cve-dora-v1-${{ github.run_id }}-${{ github.run_attempt }}
