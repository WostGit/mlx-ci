name: MLX Mamba 130M CPT Smoke Test
on:
  workflow_dispatch:
  push:
    paths: ["*.yml"]

jobs:
  mlx-mamba-cpt-smoke:
    runs-on: macos-14
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install "mlx-lm[train]" sentencepiece

      - name: Prepare Dataset
        run: |
          mkdir -p data/cve_cpt
          cat > data/cve_cpt/train.jsonl <<-'JSONL'
          {"text":"CVE-2021-44228 is a remote code execution vulnerability in Apache Log4j."}
          {"text":"SQL injection occurs when unsanitized user input is concatenated into a query."}
          {"text":"Buffer overflows happen when data exceeds the allocated memory buffer."}
          {"text":"Cross-site scripting (XSS) allows attackers to inject scripts into web pages."}
          {"text":"Broken access control is a common security vulnerability in web apps."}
          JSONL
          cp data/cve_cpt/train.jsonl data/cve_cpt/test.jsonl
          cp data/cve_cpt/train.jsonl data/cve_cpt/valid.jsonl

      - name: Baseline Evaluation (Manual Math)
        run: |
          set -euxo pipefail
          python -c "
          import json
          import mlx.core as mx
          import mlx.nn as nn
          from mlx_lm import load
          
          # 1. Load
          model, tokenizer = load('mlx-community/mamba-130m-hf-bf16')
          
          # 2. Loop
          with open('data/cve_cpt/test.jsonl') as f:
              texts = [json.loads(l)['text'] for l in f]
          
          total_loss = 0
          for text in texts:
              tokens = mx.array(tokenizer.encode(text))[None]
              inputs, targets = tokens[:, :-1], tokens[:, 1:]
              
              logits = model(inputs)
              
              # MLX Losses are in mlx.nn.losses
              loss = nn.losses.cross_entropy(logits, targets)
              avg_loss = mx.mean(loss)
              
              # Force execution
              mx.eval(avg_loss)
              total_loss += avg_loss.item()
          
          final_avg = total_loss / len(texts)
          print(f'BASELINE_LOSS:{final_avg:.4f}')
          " | tee baseline_test.txt

      - name: Training (LoRA)
        run: |
          mlx_lm.lora \
            --model mlx-community/mamba-130m-hf-bf16 \
            --train \
            --data data/cve_cpt \
            --adapter-path adapters \
            --iters 20 \
            --batch-size 1

      - name: Post-Train Evaluation (CLI)
        run: |
          mlx_lm.lora \
            --model mlx-community/mamba-130m-hf-bf16 \
            --adapter-path adapters \
            --data data/cve_cpt \
            --test \
            --batch-size 1 | tee post_train_test.txt

      - name: Performance Comparison
        run: |
          python -c "
          import re, sys, pathlib
          b = re.search(r'BASELINE_LOSS:([\d.]+)', pathlib.Path('baseline_test.txt').read_text())
          p = re.search(r'[Ll]oss\s+([\d.]+)', pathlib.Path('post_train_test.txt').read_text())
          
          if not b or not p:
              print('Metrics missing'); sys.exit(1)
              
          bl, pl = float(b.group(1)), float(p.group(1))
          print(f'Baseline: {bl} | Post-train: {pl}')
          
          # Pass if pl <= bl + buffer
          sys.exit(0 if pl <= bl + 0.1 else 1)
          "
