name: MLX Mamba 130M CPT Smoke Test
on:
  workflow_dispatch:
  push:
    paths: ["*.yml"]

jobs:
  mlx-mamba-cpt-smoke:
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install "mlx-lm[train]" sentencepiece

      - name: Prepare Dataset
        run: |
          mkdir -p data/cve_cpt
          echo '{"text":"CVE-2021-44228 is a remote code execution vulnerability."}' > data/cve_cpt/train.jsonl
          echo '{"text":"SQL injection allows unauthorized database access."}' >> data/cve_cpt/train.jsonl
          cp data/cve_cpt/train.jsonl data/cve_cpt/test.jsonl
          cp data/cve_cpt/train.jsonl data/cve_cpt/valid.jsonl

      - name: Baseline Evaluation
        run: |
          set -euxo pipefail
          python -c "
          import json
          import mlx.core as mx
          from mlx_lm import load
          from mlx_lm.tuner import evaluate
          
          # 1. Load model and tokenizer
          model, tokenizer = load('mlx-community/mamba-130m-hf-bf16')
          
          # 2. Load and Tokenize data (evaluate now expects token IDs)
          with open('data/cve_cpt/test.jsonl') as f:
              texts = [json.loads(l)['text'] for l in f]
          
          # Convert strings to lists of token IDs
          tokenized_data = [tokenizer.encode(t) for t in texts]
          
          # 3. Evaluate (Signature: model, dataset, loss, batch_size, ...)
          # In recent MLX, evaluate is simplified. We use positional args for safety.
          loss_val = evaluate(model, tokenized_data, batch_size=1)
          
          print(f'BASELINE_LOSS:{loss_val}')
          " | tee baseline_test.txt

      - name: Training (LoRA)
        run: |
          mlx_lm.lora \
            --model mlx-community/mamba-130m-hf-bf16 \
            --train \
            --data data/cve_cpt \
            --adapter-path adapters \
            --iters 10 \
            --batch-size 1

      - name: Post-Train Evaluation
        run: |
          # CLI uses the adapter, so it handles its own internal tokenization logic
          mlx_lm.lora \
            --model mlx-community/mamba-130m-hf-bf16 \
            --adapter-path adapters \
            --data data/cve_cpt \
            --test \
            --batch-size 1 | tee post_train_test.txt

      - name: Performance Comparison
        run: |
          python -c "
          import re, sys, pathlib
          b_file = pathlib.Path('baseline_test.txt').read_text()
          p_file = pathlib.Path('post_train_test.txt').read_text()
          
          b_match = re.search(r'BASELINE_LOSS:([\d.]+)', b_file)
          p_match = re.search(r'[Ll]oss\s+([\d.]+)', p_file)
          
          if not b_match or not p_match:
              print('Metrics not found. B:', b_match, 'P:', p_match)
              sys.exit(1)
              
          bl, pl = float(b_match.group(1)), float(p_match.group(1))
          print(f'Baseline: {bl} | Post-train: {pl}')
          # Pass if post-train loss is lower or within noise margin
          sys.exit(0 if pl <= bl + 0.1 else 1)
          "
