name: MLX DoRA Continuous Training
on:
  workflow_dispatch:
  schedule:
    - cron: '5 * * * *' 

jobs:
  train:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        # March 2026 Comparison: macos-14 (M1) vs macos-26 (M2/M3/M4)
        os: [macos-14, macos-26] 
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install MLX
        run: pip install "mlx-lm[train]"

      # THE FIX: Headless-safe hardware inspection
      - name: Inspect Hardware
        run: |
          echo "🚀 TARGET OS: ${{ matrix.os }}"
          echo "--- CPU Detail ---"
          sysctl -n machdep.cpu.brand_string
          echo "--- Core Count ---"
          echo "Logical Cores: $(sysctl -n hw.ncpu)"
          echo "Physical Cores: $(sysctl -n hw.physicalcpu)"
          echo "--- RAM Capacity ---"
          sysctl hw.memsize | awk '{print $2/1024/1024/1024 " GB"}'
          echo "--- System Info ---"
          # Only use SPHardwareDataType, avoid SPDisplaysDataType to prevent crashes
          system_profiler SPHardwareDataType | grep -E "Model Name|Processor Name|Memory"

      - name: Restore Last Checkpoint
        id: cache-resume
        uses: actions/cache/restore@v4
        with:
          path: adapters_dora
          key: dora-${{ matrix.os }}-${{ github.run_id }}-${{ github.run_attempt }}
          restore-keys: |
            dora-${{ matrix.os }}-

      - name: Prepare Data
        run: |
          mkdir -p data/cve_cpt
          echo '{"text":"CVE-2021-44228: Critical RCE in Apache Log4j 2 via JNDI lookup. Patch: Update to 2.17.1."}' > data/cve_cpt/train.jsonl
          cp data/cve_cpt/train.jsonl data/cve_cpt/test.jsonl
          cp data/cve_cpt/train.jsonl data/cve_cpt/valid.jsonl

      - name: Train DoRA
        run: |
          RESUME_ARG=""
          if [ -f "adapters_dora/adapters.safetensors" ]; then
            echo "🎯 RESUMING FROM PREVIOUS WEIGHTS..."
            RESUME_ARG="--resume-adapter-file adapters_dora/adapters.safetensors"
          fi

          mlx_lm.lora \
            --model mlx-community/mamba-130m-hf-bf16 \
            --train \
            --fine-tune-type dora \
            --data data/cve_cpt \
            --batch-size 1 \
            --iters 100 \
            --max-seq-length 512 \
            --adapter-path adapters_dora \
            $RESUME_ARG

      - name: Save Progress
        if: always()
        uses: actions/cache/save@v4
        with:
          path: adapters_dora
          key: dora-${{ matrix.os }}-${{ github.run_id }}-${{ github.run_attempt }}
